excluded:
  - build/
  - DerivedData/

disabled_rules:
  - trailing_whitespace  # 行尾空格（不影响功能）
  - orphaned_doc_comment  # 孤立的文档注释
  - multiple_closures_with_trailing_closure # 多闭包尾随语法
  - colon                 # 冒号格式
  - for_where             # for-where 语法偏好
  - implicit_optional_initialization # 隐式可选初始化
  - empty_count           # count == 0 vs isEmpty
  - empty_parentheses_with_trailing_closure # 空括号尾随闭包
  - redundant_discardable_let # 冗余 discardable let
  - unused_optional_binding # 未使用的可选绑定
  - redundant_string_enum_value # 冗余字符串枚举值
  - vertical_whitespace   # 垂直空白

opt_in_rules:
  - explicit_init
  - first_where
  - closure_spacing

line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 50
  error: 80

type_body_length:
  warning: 300
  error: 500

cyclomatic_complexity:
  warning: 10
  error: 15

identifier_name:
  min_length: 1
  max_length: 60
  excluded:
    - a
    - r
    - g
    - b
    - fd
    - id
    - x
    - y
    - z

type_name:
  min_length: 2

force_cast: warning