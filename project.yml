name: OpenSpeedy
options:
  bundleIdPrefix: com.openspeedy
  deploymentTarget:
    macOS: "10.15"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "10.15"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  OpenSpeedy:
    type: application
    platform: macOS
    sources:
      - path: OpenSpeedy
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openspeedy.mac
        PRODUCT_NAME: OpenSpeedy
        INFOPLIST_FILE: OpenSpeedy/Info.plist
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: OpenSpeedy/OpenSpeedy.entitlements
    dependencies:
      - target: SpeedPatch
        embed: false
        link: false

  SpeedPatch:
    type: bundle
    platform: macOS
    sources:
      - path: SpeedPatch
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openspeedy.mac.SpeedPatch
        PRODUCT_NAME: SpeedPatch
        INFOPLIST_FILE: SpeedPatch/Info.plist
        WRAPPER_EXTENSION: dylib
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: SpeedPatch/SpeedPatch.entitlements
        MACH_O_TYPE: mh_dylib
        GENERATE_DSYM_FILE: NO
        OTHER_LDFLAGS:
          - "-dynamiclib"
          - "-Wl,-no_warn_duplicate_libraries"
