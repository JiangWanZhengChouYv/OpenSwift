name: OpenSwift
options:
  bundleIdPrefix: com.openswift
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  OpenSwift:
    type: application
    platform: macOS
    sources:
      - path: OpenSwift
        excludes:
          - "**/.DS_Store"
          - "CLI/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openswift.mac
        PRODUCT_NAME: OpenSwift
        INFOPLIST_FILE: OpenSwift/Info.plist
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: OpenSwift/OpenSwift.entitlements
    dependencies:
      - target: SpeedPatch
        embed: true
        codeSign: false
        copy:
          destination: plugins
          subpath: "SpeedPatch"
      - target: openswift-cli
        embed: true
        codeSign: false
        copy:
          destination: sharedSupport
          subpath: ""

  SpeedPatch:
    type: bundle
    platform: macOS
    sources:
      - path: SpeedPatch
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openswift.mac.SpeedPatch
        PRODUCT_NAME: SpeedPatch
        INFOPLIST_FILE: SpeedPatch/Info.plist
        WRAPPER_EXTENSION: dylib
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: SpeedPatch/SpeedPatch.entitlements
        MACH_O_TYPE: mh_dylib
        GENERATE_DSYM_FILE: NO
        OTHER_LDFLAGS:
          - "-dynamiclib"
          - "-Wl,-no_warn_duplicate_libraries"
        CLANG_ENABLE_MODULES: YES
        SWIFT_OBJC_BRIDGING_HEADER: ""

  openswift-cli:
    type: tool
    platform: macOS
    sources:
      - path: OpenSwift/CLI
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openswift.cli
        PRODUCT_NAME: openswift
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.0"
        SWIFT_FORCE_STATIC_STDLIBS: YES

  TimerTestApp:
    type: application
    platform: macOS
    sources:
      - path: TimerTestApp
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openswift.timertest
        PRODUCT_NAME: TimerTestApp
        INFOPLIST_FILE: TimerTestApp/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        MACOSX_DEPLOYMENT_TARGET: "13.0"
